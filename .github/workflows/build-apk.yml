name: Build APK

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  EXPECTED_UPLOAD_CERT_SHA256: 'a86d576ff1ec0e3245f5a6152c5d8d66b5df8bb510820d75dc61110b19c3aeb4'

jobs:
  build:
    name: Build Fermata Auto APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read versions from version catalog
        run: |
          ver_file=gradle/libs.versions.toml
          version() { grep -Po "(?<=$1).+" $ver_file |  sed -e 's/[= "]//g'; }
          app_version="$(version appVersionName)-$(git rev-parse --short HEAD)"
          sed -ri "s/appVersionName.+/appVersionName = \"$app_version\"/" $ver_file
          echo "APP_VERSION=$app_version" >> $GITHUB_ENV
          echo "ANDROID_NDK_VERSION=$(version ndkVersion)-$git_hash" >> $GITHUB_ENV

      - name: Export vars
        env:
          APP_NAME: ${{ vars.APP_NAME }}
          APP_ID_SFX: ${{ vars.APP_ID_SFX }}
          ARTIFACT_SFX: ${{ vars.ARTIFACT_SFX }}
        run: |
          export_vars() {
            for name in "$@"; do
              local value="${!name}"
              [ -z "$value" ] && continue
              [ "$value" = "none" ] && value=""
              echo "$name=$value" >> "$GITHUB_ENV"
            done
          }
          export_vars APP_NAME APP_ID_SFX ARTIFACT_SFX

      - name: Prepare build identifiers
        env:
          BRANCH_OWNER: ${{ github.event.pull_request.head.repo.owner.login || github.repository_owner }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          [ -v APP_NAME ] && [ -v APP_ID_SFX ] && [ -v ARTIFACT_SFX ] && exit 0

          sanitize_package_segment() {
            tr '[:upper:]' '[:lower:]' <<< "$1" \
              | sed -E 's/[^a-z0-9]+/_/g; s/^_+|_+$//g; s/_+/_/g; s/^([0-9])/x\1/'
          }

          owner="$(sanitize_package_segment "$BRANCH_OWNER")"
          branch="$(sanitize_package_segment "$BRANCH_NAME")"
          sha="$(git rev-parse --short HEAD)"

          [ -v APP_NAME ] || echo "APP_NAME=Fermata Auto (${BRANCH_OWNER}-${sha})" >> "$GITHUB_ENV"
          [ -v APP_ID_SFX ] || echo "APP_ID_SFX=.${owner}" >> "$GITHUB_ENV"
          [ -v ARTIFACT_SFX ] || echo "ARTIFACT_SFX=-${owner}-${branch}" >> "$GITHUB_ENV"

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/${{ env.ANDROID_NDK_VERSION }}
          key: ${{ runner.os }}-android-ndk-${{ env.ANDROID_NDK_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify untrusted change without signing secrets
        if: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}
        env:
          NO_GS: true
        run: ./gradlew test --no-daemon --build-cache

      - name: Create keystore and local.properties
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        env:
          CI_KEYSTORE: ${{ secrets.CI_KEYSTORE }}
          CI_ALIAS: ${{ secrets.CI_ALIAS }}
          CI_KEY_PWD: ${{ secrets.CI_KEY_PWD }}
          CI_KEYSTORE_PWD: ${{ secrets.CI_KEYSTORE_PWD }}
        run: |
          for name in CI_KEYSTORE CI_ALIAS CI_KEY_PWD CI_KEYSTORE_PWD; do
            [ -n "${!name}" ] || { echo "Missing release signing secret: $name" >&2; exit 1; }
          done
          echo "$CI_KEYSTORE" | base64 -d > keystore.jks

          cat > local.properties <<EOF
          storeFile=$(pwd)/keystore.jks
          keyAlias=$CI_ALIAS
          keyPassword=$CI_KEY_PWD
          storePassword=$CI_KEYSTORE_PWD
          EOF
          chmod 600 keystore.jks local.properties

      - name: Build APKs
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        env:
          NO_GS: true
        run: |
          out=fermata/build/outputs/apk_from_bundle/autoRelease
          bundle_out=fermata/build/outputs/bundle/autoRelease
          mkdir -p dist/arm64 dist/arm dist/aab
          echo "App name: $APP_NAME"
          echo "Package suffix: $APP_ID_SFX"
          expected_package="me.app.fermataX.auto${APP_ID_SFX}"
          artifact_identity="$expected_package"
          normalize_cert() { tr -d ':[:space:]' | tr '[:upper:]' '[:lower:]'; }
          verify_apk() {
            local apk="$1"
            local package certificate
            package="$(apkanalyzer manifest application-id "$apk")"
            [ "$package" = "$expected_package" ] || {
              echo "Package mismatch: expected $expected_package, found $package" >&2
              exit 1
            }
            case "$(basename "$apk")" in
              *"$artifact_identity"*) ;;
              *) echo "Artifact filename does not identify package: $apk" >&2; exit 1 ;;
            esac
            apksigner verify --verbose "$apk"
            certificate="$(apksigner verify --print-certs "$apk" \
              | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' | head -n 1 | normalize_cert)"
            [ "$certificate" = "$EXPECTED_UPLOAD_CERT_SHA256" ] || {
              echo "APK upload certificate mismatch: $certificate" >&2
              exit 1
            }
          }
          verify_aab() {
            local aab="$1"
            local certificate
            case "$(basename "$aab")" in
              *"$artifact_identity"*) ;;
              *) echo "AAB filename does not identify package: $aab" >&2; exit 1 ;;
            esac
            jarsigner -verify -strict "$aab"
            certificate="$(keytool -printcert -jarfile "$aab" \
              | sed -n 's/.*SHA256: //p' | head -n 1 | normalize_cert)"
            [ "$certificate" = "$EXPECTED_UPLOAD_CERT_SHA256" ] || {
              echo "AAB upload certificate mismatch: $certificate" >&2
              exit 1
            }
          }
          select_apk() {
            mapfile -t apks < <(find "$out" -maxdepth 1 -type f -name '*.apk' -print)
            [ "${#apks[@]}" -eq 1 ] || {
              echo "Expected exactly one APK in $out, found ${#apks[@]}" >&2
              exit 1
            }
            printf '%s\n' "${apks[0]}"
          }
          ARGS=(--build-cache)
          [ -z "$APP_NAME" ] || ARGS+=("-PAPP_NAME=$APP_NAME")
          [ -z "$APP_ID_SFX" ] || ARGS+=("-PAPP_ID_SFX=$APP_ID_SFX")
          ./gradlew fermata:packageAutoReleaseUniversalApk -PABI=arm64-v8a "${ARGS[@]}"
          apk="$(select_apk)"
          verify_apk "$apk"
          mv "$apk" dist/arm64/
          ./gradlew fermata:packageAutoReleaseUniversalApk -PABI=armeabi-v7a "${ARGS[@]}"
          apk="$(select_apk)"
          verify_apk "$apk"
          mv "$apk" dist/arm/
          ./gradlew fermata:bundleAutoRelease "${ARGS[@]}"
          mapfile -t aabs < <(find "$bundle_out" -maxdepth 1 -type f -name '*.aab' -print)
          [ "${#aabs[@]}" -eq 1 ] || {
            echo "Expected exactly one AAB in $bundle_out, found ${#aabs[@]}" >&2
            exit 1
          }
          verify_aab "${aabs[0]}"
          mv "${aabs[0]}" dist/aab/

      - name: Upload arm64 APK
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: fermata-auto-${{ env.APP_VERSION }}${{ env.ARTIFACT_SFX }}-arm64
          path: dist/arm64/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload arm APK
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: fermata-auto-${{ env.APP_VERSION }}${{ env.ARTIFACT_SFX }}-arm
          path: dist/arm/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Android App Bundle
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: fermata-auto-${{ env.APP_VERSION }}${{ env.ARTIFACT_SFX }}-aab
          path: dist/aab/*.aab
          retention-days: 30
          if-no-files-found: error
