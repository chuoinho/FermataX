android {
    namespace = "me.aap.fermata.addon.web"
    defaultConfig {
        versionCode 1
        versionName "1.0"
    }
}

ext {
    addons = [
            [
                    name : 'youtube',
                    id   : 'youtube_fragment',
                    icon : 'youtube',
                    class: 'me.aap.fermata.addon.web.yt.YoutubeAddon',
                    fragment: true,
					capabilities: 'dashboard,navigation,youtube,voice_search',
					voiceTarget: 'youtube',
                    order: 2
            ],
            [
                    name : 'web_browser',
                    id   : 'web_browser_fragment',
                    icon : 'web',
                    class: 'me.aap.fermata.addon.web.WebBrowserAddon',
                    fragment: true,
					capabilities: 'dashboard,navigation,web,voice_search',
					voiceTarget: 'web',
                    order: 3
            ]
    ]
}

dependencies {
    implementation project(':utils')
    implementation project(':fermata')
    implementation libs.androidxMedia
    implementation libs.googlePlayFeatureDelivery
    implementation libs.androidxAppcompat
    implementation libs.androidMaterial
    implementation libs.androidxConstraintlayout
    implementation libs.androidxSwiperefreshlayout
    implementation libs.androidxWebkit
}
